<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFAS Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    /* ── Launcher ── */
    #chat-launcher {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b1538, #6e102c);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(139,21,56,0.38);
      z-index: 100;
      display: grid;
      place-items: center;
      transition: transform 0.18s;
    }
    #chat-launcher:hover { transform: scale(1.09); }

    /* ── Panel ── */
    #chat-panel {
      position: fixed;
      right: 20px;
      bottom: 88px;
      width: 355px;
      height: 560px;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      z-index: 100;
      border: 1px solid #e7ddd6;
      overflow: hidden;
    }

    #chat-panel.hidden { display: none; }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(135deg, #8b1538, #6e102c);
      color: #fff;
      padding: 13px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .bot-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: grid; place-items: center;
      font-size: 17px; flex-shrink: 0;
    }
    .bot-name { font-weight: 700; font-size: 14px; }
    .bot-sub  { font-size: 11px; opacity: 0.88; margin-top: 1px; }
    .btn-close {
      border: none; background: transparent;
      color: #fff; font-size: 17px;
      cursor: pointer; padding: 4px; line-height: 1;
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 13px;
      background: #faf7f5;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .msg-row { display: flex; }
    .msg-row.bot  { justify-content: flex-start; }
    .msg-row.user { justify-content: flex-end; }

    .bubble {
      max-width: 82%;
      padding: 9px 13px;
      border-radius: 17px;
      font-size: 13.5px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.bot  { background: #fff; color: #2b2b2b; border: 1px solid #e7ddd6; }
    .bubble.user { background: #8b1538; color: #fff; }
    .bubble.typing { font-style: italic; opacity: 0.6; }

    /* ── Sources ── */
    .sources {
      margin-top: 7px; padding-top: 7px;
      border-top: 1px dashed #e0d6cf;
      font-size: 12px;
    }
    .sources-title { font-weight: 700; color: #8b1538; margin-bottom: 3px; }
    .source-link {
      display: block; color: #8b1538;
      text-decoration: none; margin-bottom: 3px;
    }
    .source-link:hover { text-decoration: underline; }

    /* ── Quick replies ── */
    .quick-replies {
      padding: 8px 11px;
      display: flex; flex-wrap: wrap; gap: 6px;
      background: #fff;
      border-top: 1px solid #f0ebe7;
      flex-shrink: 0;
    }
    .qbtn {
      border: 1px solid #e7ddd6;
      border-radius: 999px;
      padding: 5px 11px;
      background: #faf7f5;
      color: #8b1538;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .qbtn:hover { background: #f0e8e3; }

    /* ── Input bar ── */
    .chat-inputbar {
      display: flex; gap: 8px;
      padding: 10px 12px;
      background: #fff;
      border-top: 1px solid #e7ddd6;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      border: 1px solid #e7ddd6;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13.5px;
      font-family: inherit;
      outline: none;
    }
    .chat-input:focus   { border-color: #8b1538; }
    .chat-input:disabled { background: #f5f5f5; }

    .btn-send {
      width: 40px; height: 40px;
      border: none; border-radius: 50%;
      background: linear-gradient(135deg, #8b1538, #6e102c);
      color: #fff; cursor: pointer;
      font-size: 14px; flex-shrink: 0;
    }
    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; }

    @media (max-width: 420px) {
      #chat-panel {
        right: 8px; left: 8px;
        bottom: 80px; width: auto;
        height: calc(100dvh - 96px);
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>

  <!-- Launcher -->
  <button id="chat-launcher" aria-label="เปิด OFAS Bot">💬</button>

  <!-- Panel -->
  <div id="chat-panel" class="hidden" role="dialog" aria-label="OFAS Bot">

    <div class="chat-header">
      <div class="header-left">
        <div class="bot-avatar">💼</div>
        <div>
          <div class="bot-name">OFAS Bot (Netlify)</div>
          <div class="bot-sub">ผู้ช่วยด้านการเงิน การบัญชี และการพัสดุ</div>
        </div>
      </div>
      <button class="btn-close" id="btn-close" aria-label="ปิด">✕</button>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="msg-row bot">
        <div class="bubble bot">
          สวัสดีค่ะ ฉันคือ OFAS Bot ยินดีช่วยตอบคำถามด้านการเงิน การบัญชี และการพัสดุค่ะ
        </div>
      </div>
    </div>

    <div class="quick-replies">
      <button class="qbtn" data-q="ขั้นตอนการเบิกเงิน">ขั้นตอนการเบิกเงิน</button>
      <button class="qbtn" data-q="อัตราค่าเดินทาง">อัตราค่าเดินทาง</button>
      <button class="qbtn" data-q="สวัสดิการด้านสุขภาพ">สวัสดิการด้านสุขภาพ</button>
    </div>

    <div class="chat-inputbar">
      <input class="chat-input" id="chat-input" type="text"
             placeholder="พิมพ์คำถาม..." autocomplete="off" />
      <button class="btn-send" id="btn-send" type="button">➤</button>
    </div>

  </div>

  <script>
    // ✅ เปลี่ยน URL นี้ให้ตรงกับ Netlify ของคุณ
    const API_URL = "https://gemini-chat-widget-v2-2.netlify.app/.netlify/functions/chat";

    const launcher   = document.getElementById("chat-launcher");
    const panel      = document.getElementById("chat-panel");
    const closeBtn   = document.getElementById("btn-close");
    const messagesEl = document.getElementById("chat-messages");
    const inputEl    = document.getElementById("chat-input");
    const sendBtn    = document.getElementById("btn-send");

    const history = [];

    // Toggle
    launcher.addEventListener("click", () => {
      panel.classList.toggle("hidden");
      if (!panel.classList.contains("hidden")) inputEl.focus();
    });
    closeBtn.addEventListener("click", () => panel.classList.add("hidden"));

    // Quick replies
    document.querySelectorAll(".qbtn").forEach(btn =>
      btn.addEventListener("click", () => send(btn.dataset.q))
    );

    // Send on Enter
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(inputEl.value); }
    });
    sendBtn.addEventListener("click", () => send(inputEl.value));

    // ── Helpers ──
    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function esc(t = "") {
      return String(t).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
    }

    function addMessage(role, text, sources = []) {
      const row    = document.createElement("div");
      row.className = `msg-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;

      let html = `<div>${esc(text).replace(/\n/g,"<br>")}</div>`;

      if (role === "bot" && sources.length > 0) {
        const links = sources
          .filter(s => s?.url)
          .map(s => `<a class="source-link" href="${s.url}" target="_blank" rel="noopener">${esc(s.name || "เอกสารอ้างอิง")}</a>`)
          .join("");
        if (links) html += `<div class="sources"><div class="sources-title">อ้างอิง</div>${links}</div>`;
      }

      bubble.innerHTML = html;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollBottom();
    }

    function showTyping() {
      const row = document.createElement("div");
      row.className = "msg-row bot";
      row.id = "typing-row";
      row.innerHTML = `<div class="bubble bot typing">กำลังพิมพ์...</div>`;
      messagesEl.appendChild(row);
      scrollBottom();
    }

    function hideTyping() {
      document.getElementById("typing-row")?.remove();
    }

    function setLoading(on) {
      inputEl.disabled = on;
      sendBtn.disabled = on;
    }

    // ── Send ──
    async function send(text) {
      const clean = String(text || "").trim();
      if (!clean) return;

      addMessage("user", clean);
      history.push({ role: "user", text: clean });
      inputEl.value = "";
      setLoading(true);
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ agentId: "ofas-bot", message: clean, history })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        hideTyping();

        const reply   = data.reply   || "ขออภัย ระบบไม่สามารถตอบได้";
        const sources = Array.isArray(data.sources) ? data.sources : [];

        addMessage("bot", reply, sources);
        history.push({ role: "assistant", text: reply });

      } catch (err) {
        hideTyping();
        addMessage("bot", "เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้งค่ะ");
        console.error("[OFAS Bot]", err);
      } finally {
        setLoading(false);
        inputEl.focus();
      }
    }
  </script>

</body>
</html>
