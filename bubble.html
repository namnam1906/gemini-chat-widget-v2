<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFAS Bot</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    /* ===== Launcher Button ===== */
    .chat-launcher {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 58px;
      height: 58px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b1538, #6e102c);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
      z-index: 1000;
      display: grid;
      place-items: center;
      font-size: 24px;
    }

    /* ===== Chat Panel ===== */
    .chat-panel {
      position: fixed;
      right: 20px;
      bottom: 90px;
      width: 360px;
      height: 580px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.22);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      border: 1px solid #e7ddd6;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #8b1538, #6e102c);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bot-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .bot-name { font-weight: 700; font-size: 15px; }
    .bot-subtitle { font-size: 11px; opacity: 0.9; }

    .chat-close {
      border: none;
      background: transparent;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: #faf7f5;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message-row { display: flex; }
    .bot-row { justify-content: flex-start; }
    .user-row { justify-content: flex-end; }

    .message {
      max-width: 84%;
      padding: 10px 13px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bot-message {
      background: #fff;
      color: #2b2b2b;
      border: 1px solid #e7ddd6;
    }

    .user-message {
      background: #8b1538;
      color: #fff;
    }

    .typing { font-style: italic; opacity: 0.7; }

    /* Sources */
    .message-sources {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #e7ddd6;
      font-size: 12px;
    }

    .message-sources-title {
      font-weight: 700;
      color: #8b1538;
      margin-bottom: 4px;
    }

    .message-source-link {
      display: block;
      color: #8b1538;
      text-decoration: none;
      margin-bottom: 3px;
    }

    .message-source-link:hover { text-decoration: underline; }

    /* Quick replies */
    .quick-replies {
      padding: 8px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: #fff;
      flex-shrink: 0;
    }

    .quick-reply {
      border: 1px solid #e7ddd6;
      border-radius: 999px;
      padding: 6px 12px;
      background: #faf7f5;
      color: #8b1538;
      cursor: pointer;
      font-size: 12px;
    }

    .quick-reply:hover { background: #f0e8e3; }

    /* Input bar */
    .chat-input-bar {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: #fff;
      border-top: 1px solid #e7ddd6;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      border: 1px solid #e7ddd6;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
    }

    .chat-input:focus { border-color: #8b1538; }

    .chat-send {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b1538, #6e102c);
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }

    @media (max-width: 480px) {
      .chat-panel {
        right: 10px;
        left: 10px;
        bottom: 80px;
        width: auto;
        height: calc(100vh - 100px);
      }
    }
  </style>
</head>
<body>

  <!-- Launcher Button -->
  <button id="chat-launcher" class="chat-launcher" aria-label="เปิดแชต">💬</button>

  <!-- Chat Panel -->
  <section id="chat-panel" class="chat-panel hidden">

    <div class="chat-header">
      <div class="chat-header-left">
        <div class="bot-avatar">💼</div>
        <div>
          <div class="bot-name">OFAS Bot</div>
          <div class="bot-subtitle">ผู้ช่วยด้านการเงิน การบัญชี และการพัสดุ</div>
        </div>
      </div>
      <button id="chat-close" class="chat-close">✕</button>
    </div>

    <div id="chat-messages" class="chat-messages">
      <div class="message-row bot-row">
        <div class="message bot-message">
          สวัสดีค่ะ ฉันคือ OFAS Bot ยินดีช่วยตอบคำถามด้านการเงิน การบัญชี และการพัสดุค่ะ
        </div>
      </div>
    </div>

    <div class="quick-replies">
      <button class="quick-reply" data-text="ขั้นตอนการเบิกเงิน">ขั้นตอนการเบิกเงิน</button>
      <button class="quick-reply" data-text="อัตราค่าเดินทาง">อัตราค่าเดินทาง</button>
      <button class="quick-reply" data-text="สวัสดิการด้านสุขภาพ">สวัสดิการด้านสุขภาพ</button>
    </div>

    <form id="chat-form" class="chat-input-bar">
      <input id="chat-input" class="chat-input" type="text" placeholder="พิมพ์คำถาม..." autocomplete="off" />
      <button type="submit" class="chat-send">➤</button>
    </form>

  </section>

  <script>
    const launcher = document.getElementById("chat-launcher");
    const panel = document.getElementById("chat-panel");
    const closeBtn = document.getElementById("chat-close");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("chat-input");
    const messagesEl = document.getElementById("chat-messages");
    const quickReplies = document.querySelectorAll(".quick-reply");

    // ⚠️ เปลี่ยน URL นี้ให้ตรงกับ Netlify/Vercel ของคุณ
    const API_URL = "https://gemini-chat-widget-v2.netlify.app/.netlify/functions/chat";

    const history = [];

    launcher.addEventListener("click", () => panel.classList.toggle("hidden"));
    closeBtn.addEventListener("click", () => panel.classList.add("hidden"));

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text = "") {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function appendMessage(role, text, sources = []) {
      const row = document.createElement("div");
      row.className = `message-row ${role === "user" ? "user-row" : "bot-row"}`;

      const bubble = document.createElement("div");
      bubble.className = `message ${role === "user" ? "user-message" : "bot-message"}`;

      let html = `<div>${escapeHtml(text).replace(/\n/g, "<br>")}</div>`;

      if (role === "bot" && sources.length > 0) {
        const links = sources.filter(s => s.url).map(s =>
          `<a class="message-source-link" href="${s.url}" target="_blank">${escapeHtml(s.name || "เอกสารอ้างอิง")}</a>`
        ).join("");
        if (links) {
          html += `<div class="message-sources"><div class="message-sources-title">อ้างอิง</div>${links}</div>`;
        }
      }

      bubble.innerHTML = html;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function appendTyping() {
      const row = document.createElement("div");
      row.className = "message-row bot-row";
      row.id = "typing-row";
      row.innerHTML = `<div class="message bot-message typing">กำลังพิมพ์...</div>`;
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function removeTyping() {
      document.getElementById("typing-row")?.remove();
    }

    async function sendMessage(text) {
      const clean = String(text || "").trim();
      if (!clean) return;

      appendMessage("user", clean);
      history.push({ role: "user", text: clean });
      input.value = "";
      input.disabled = true;
      appendTyping();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ agentId: "ofas-bot", message: clean, history })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        removeTyping();

        const reply = data.reply || "ขออภัย ระบบไม่สามารถตอบได้";
        const sources = Array.isArray(data.sources) ? data.sources : [];

        appendMessage("bot", reply, sources);
        history.push({ role: "assistant", text: reply });

      } catch (error) {
        removeTyping();
        appendMessage("bot", "เกิดข้อผิดพลาดในการเชื่อมต่อ");
        console.error(error);
      } finally {
        input.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      sendMessage(input.value);
    });

    quickReplies.forEach(btn => {
      btn.addEventListener("click", () => sendMessage(btn.dataset.text || ""));
    });
  </script>

</body>
</html>
