<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <title>OFAS Bot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f7f7f7;
        }

        #chat {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .msg {
            margin: 8px 0;
        }

        .user {
            text-align: right;
            color: blue;
        }

        .bot {
            text-align: left;
            color: black;
        }

        #input {
            display: flex;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
        }

        button {
            padding: 10px;
            border: none;
            background: hotpink;
            color: white;
        }
    </style>
</head>

<body>

    <div id="chat">
        <div id="messages"></div>

        <div id="input">
            <input id="text" placeholder="พิมพ์ข้อความ..." />
            <button onclick="send()">ส่ง</button>
        </div>
    </div>

    <script>
        async function send() {
            const input = document.getElementById("text");
            const msg = input.value;
            if (!msg) return;

            append("user", msg);
            input.value = "";

            const res = await fetch("/.netlify/functions/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });

            const data = await res.json();

            append("bot", data.reply);
        }

        function append(role, text) {
            const div = document.createElement("div");
            div.className = "msg " + role;
            div.innerText = role + ": " + text;
            document.getElementById("messages").appendChild(div);
        }
    </script>

</body>

</html>
