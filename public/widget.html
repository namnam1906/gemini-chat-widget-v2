<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OFAS Widget</title>
    <link rel="stylesheet" href="/widget.css" />
</head>

<body>
    <div id="widget-root">
        <button id="chat-launcher" class="chat-launcher" aria-label="เปิดแชต">
            <span class="launcher-icon">💬</span>
        </button>

        <section id="chat-panel" class="chat-panel hidden" aria-label="AI Chat">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="bot-avatar">🤖</div>
                    <div>
                        <div class="bot-name">OFAS Bot</div>
                        <div class="bot-subtitle">ผู้ช่วยการเงิน</div>
                    </div>
                </div>

                <button id="chat-close" class="chat-close" aria-label="ปิดแชต">✕</button>
            </div>

            <div id="chat-messages" class="chat-messages">
                <div class="message-row bot-row">
                    <div class="message bot-message">
                        สวัสดีค่ะ ฉันคือ OFAS Bot ผู้ช่วยการเงิน
                        ยินดีช่วยตอบคำถามเกี่ยวกับอัตราการจ่าย ประกาศจุฬาฯ และข้อมูลทั่วไปค่ะ
                    </div>
                </div>
            </div>

            <div class="quick-replies" id="quick-replies">
                <button class="quick-reply" data-text="อัตราการจ่าย">อัตราการจ่าย</button>
                <button class="quick-reply" data-text="ประกาศจุฬาฯ">ประกาศจุฬาฯ</button>
                <button class="quick-reply" data-text="สวัสดิการด้านสุขภาพ">สวัสดิการด้านสุขภาพ</button>
                <!-- <button class="quick-reply" data-text="ประกันสุขภาพแบบกลุ่ม">ประกันสุขภาพแบบกลุ่ม</button> -->
            </div>

            <form id="chat-form" class="chat-input-bar">
                <input id="chat-input" class="chat-input" type="text" placeholder="พิมพ์ข้อความ..."
                    autocomplete="off" />
                <button id="chat-send" class="chat-send" type="submit">➤</button>
            </form>
        </section>
    </div>

    <script src="/widget.js"></script>
</body>

</html>
